<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#FAF8F5" />

    <!-- Primary SEO (build-time fallback; updated at runtime from CMS) -->
    <title data-default>Megan Feil — Content Designer and Writer</title>
    <meta name="description" data-default content="Megan Feil is a content designer and writer interested in where human wellbeing, technology, and everyday life meet." />
    <link rel="canonical" href="https://megfeil.com" />

    <!-- Open Graph -->
    <meta property="og:type" content="profile" />
    <meta property="og:title" content="Megan Feil — Content Designer and Writer" />
    <meta property="og:description" content="Megan Feil is a content designer and writer interested in where human wellbeing, technology, and everyday life meet." />
    <meta property="og:url" content="https://megfeil.com" />
    <meta property="og:image" content="https://megfeil.com/og-image.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale" content="en_US" />
    <meta property="og:site_name" content="Megan Feil" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Megan Feil — Content Designer and Writer" />
    <meta name="twitter:description" content="Megan Feil is a content designer and writer interested in where human wellbeing, technology, and everyday life meet." />
    <meta name="twitter:image" content="https://megfeil.com/og-image.jpg" />

    <!-- Preloads: only the single most critical above-the-fold font -->
    <link rel="preload" href="/fonts/fraunces-latin-400-normal.woff2" as="font" type="font/woff2" crossorigin />

    <!-- Preload the LCP image (AVIF first; browser picks supported source) -->
    <link rel="preload" as="image" href="/images/megan-feil-homepage.avif" type="image/avif" />

    <!-- Structured data (build-time fallback; updated at runtime from CMS) -->
    <script type="application/ld+json" id="person-schema">
    {
      "@context": "https://schema.org",
      "@type": "Person",
      "name": "Megan Feil",
      "url": "https://megfeil.com",
      "image": "https://megfeil.com/og-image.jpg",
      "jobTitle": "Content Designer and Writer",
      "address": {
        "@type": "PostalAddress",
        "addressLocality": "Raleigh",
        "addressRegion": "NC",
        "addressCountry": "US"
      },
      "sameAs": []
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
